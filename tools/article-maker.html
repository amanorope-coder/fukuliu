<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事メーカー — FUKURYU</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #fcfcfc;
            --bg-soft: #f3f3f4;
            --fg:      #111114;
            --fg-mute: #5f6168;
            --line:    #e3e3e6;
            --accent:  #235BC8;
            --accent2: #F15A22;
            --sans:    "Inter", "Noto Sans JP", sans-serif;
            --serif:   "Noto Serif JP", serif;
            --t:       cubic-bezier(.2,.7,.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--sans);
            background: var(--bg-soft);
            color: var(--fg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- ヘッダー ---- */
        .tool-header {
            background: var(--fg);
            color: #fff;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .tool-header__brand {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(255,255,255,.6);
        }
        .tool-header__title {
            font-family: var(--serif);
            font-weight: 900;
            font-size: 22px;
            color: #fff;
            letter-spacing: -0.01em;
        }
        .tool-header a {
            color: rgba(255,255,255,.55);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.1em;
        }
        .tool-header a:hover { color: #fff; }

        /* ---- メイン ---- */
        .tool-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 40px 80px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 32px;
            align-items: start;
        }

        /* ---- フォームパネル ---- */
        .form-panel {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 32px;
            position: sticky;
            top: 24px;
        }
        .form-panel__title {
            font-family: var(--serif);
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }
        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--fg-mute);
            margin-bottom: 7px;
        }
        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--line);
            border-radius: 2px;
            font-family: var(--sans);
            font-size: 14px;
            color: var(--fg);
            background: var(--bg);
            transition: border-color .2s var(--t);
            appearance: none;
        }
        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .field textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
        .field--body textarea { min-height: 320px; font-size: 13px; }

        /* カテゴリ選択 */
        .cat-select { position: relative; }
        .cat-select select { padding-right: 32px; cursor: pointer; }
        .cat-select::after {
            content: "▾";
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--fg-mute);
            pointer-events: none;
        }

        /* ボタン */
        .btn-generate {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 2px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.14em;
            cursor: pointer;
            transition: background .2s var(--t);
            margin-top: 8px;
        }
        .btn-generate:hover { background: #1a4aad; }
        .btn-download {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 2px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.14em;
            cursor: pointer;
            transition: all .2s var(--t);
            margin-top: 10px;
            display: none;
        }
        .btn-download:hover { background: var(--accent); color: #fff; }
        .btn-download.is-visible { display: block; }

        /* スラッグヒント */
        .field-hint {
            font-size: 11px;
            color: var(--fg-mute);
            margin-top: 6px;
            font-family: monospace;
            letter-spacing: 0.03em;
        }

        /* ファイル名プレビュー（後方互換、非表示） */
        .filename-preview { display: none; }

        /* 書式ヘルプ */
        .format-help {
            background: var(--bg-soft);
            border-radius: 2px;
            padding: 14px 16px;
            margin-top: 8px;
            font-size: 11px;
            color: var(--fg-mute);
            line-height: 1.9;
        }
        .format-help code {
            background: var(--line);
            padding: 1px 5px;
            border-radius: 2px;
            font-family: monospace;
            font-size: 11px;
            color: var(--fg);
        }

        /* ---- プレビューパネル ---- */
        .preview-panel {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 4px;
            overflow: hidden;
        }
        .preview-panel__header {
            padding: 16px 28px;
            background: var(--bg-soft);
            border-bottom: 1px solid var(--line);
            font-size: 11px;
            letter-spacing: 0.16em;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--fg-mute);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .preview-panel__dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }
        .preview-panel__content {
            padding: 48px 56px 64px;
        }
        /* プレビュー内の記事スタイル */
        .preview-article__eyebrow {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .preview-article__tag {
            display: inline-block;
            font-size: 10px;
            letter-spacing: 0.14em;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 999px;
            text-transform: uppercase;
            color: #fff;
        }
        .tag-review   { background: #F15A22; }
        .tag-essay    { background: #235BC8; }
        .tag-dialogue { background: #1a1a1a; }
        .preview-article__date {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--fg-mute);
        }
        .preview-article__title {
            font-family: var(--serif);
            font-weight: 900;
            font-size: clamp(28px, 4vw, 44px);
            line-height: 1.3;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
        }
        .preview-article__subtitle {
            font-family: var(--serif);
            font-size: 18px;
            color: var(--fg-mute);
            line-height: 1.6;
            margin-bottom: 28px;
            font-weight: 400;
        }
        .preview-article__author {
            font-size: 13px;
            color: var(--fg-mute);
            padding: 18px 0;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            margin-bottom: 44px;
            letter-spacing: 0.04em;
        }
        .preview-article__body {
            font-family: var(--serif);
            font-size: 17px;
            line-height: 2.1;
            color: var(--fg);
            max-width: 680px;
        }
        .preview-article__body h2 {
            font-family: var(--serif);
            font-weight: 700;
            font-size: 22px;
            margin: 52px 0 20px;
            letter-spacing: -0.01em;
        }
        .preview-article__body h3 {
            font-family: var(--serif);
            font-weight: 700;
            font-size: 18px;
            margin: 36px 0 14px;
        }
        .preview-article__body p { margin-bottom: 28px; }
        .preview-article__body blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 24px;
            margin: 32px 0;
            color: var(--fg-mute);
            font-style: italic;
        }
        .preview-article__body strong { font-weight: 700; }
        .preview-article__body em { font-style: italic; }
        .preview-article__body hr {
            border: none;
            border-top: 1px solid var(--line);
            margin: 48px 0;
        }
        .preview-empty {
            padding: 80px 0;
            text-align: center;
            color: var(--fg-mute);
            font-size: 14px;
            letter-spacing: 0.06em;
        }

        @media (max-width: 900px) {
            .tool-body { grid-template-columns: 1fr; padding: 24px 20px; }
            .form-panel { position: static; }
            .preview-panel__content { padding: 32px 28px; }
        }
    </style>
</head>
<body>

<header class="tool-header">
    <div>
        <p class="tool-header__brand">FUKURYU — 記事メーカー</p>
        <h1 class="tool-header__title">Article Maker</h1>
    </div>
    <a href="../index.html">← サイトに戻る</a>
</header>

<div class="tool-body">

    <!-- ============ フォーム ============ -->
    <aside class="form-panel">
        <h2 class="form-panel__title">記事情報を入力</h2>

        <div class="field">
            <label>カテゴリ</label>
            <div class="cat-select">

                    <option value="review">展示レビュー</option>
                    <option value="essay" selected>エッセイ</option>
                    <option value="dialogue">対談</option>

        </div>

        <div class="field">
            <label>タイトル</label>
            <input type="text" id="f-title" placeholder="記事タイトルを入力">
        </div>

        <div class="field">
            <label>サブタイトル（任意）</label>
            <input type="text" id="f-subtitle" placeholder="副題や一言説明">
        </div>

        <div class="field">
            <label>著者名</label>
            <input type="text" id="f-author" placeholder="例：編集部 / 松森ひろあき">
        </div>

        <div class="field">
            <label>公開日</label>
            <input type="date" id="f-date">
        </div>

        <div class="field">
            <label>スラッグ（ファイル名）</label>
            <input type="text" id="f-slug" placeholder="例: kyoto-exhibition">
            <p class="field-hint">保存先: articles/<span id="slug-display">——</span>.html</p>
        </div>

        <div class="field field--body">
            <label>本文</label>
            <textarea id="f-body" placeholder="ここに本文を貼り付けてください。

Google Docs や Word からコピーした文章をそのまま貼り付けるだけでOKです。

【書式について（任意）】
# 見出し（大）
## 見出し（小）
> 引用・ブロック引用
**太字** / *イタリック*
--- （区切り線）

空行を入れると段落が分かれます。"></textarea>
            <div class="format-help">
                <strong>書式メモ</strong><br>
                <code># タイトル</code> 大見出し　<code>## 小見出し</code><br>
                <code>**太字**</code>　<code>*イタリック*</code><br>
                <code>&gt; 引用文</code>　<code>---</code> 区切り線<br>
                空行 → 段落分け
            </div>
        </div>

        <button class="btn-generate" onclick="generatePreview()">プレビューを生成</button>
        <button class="btn-download" id="btn-download" onclick="downloadHTML()">HTMLをダウンロード</button>
        <p class="filename-preview" id="filename-preview"></p>
    </aside>

    <!-- ============ プレビュー ============ -->
    <section class="preview-panel">
        <div class="preview-panel__header">
            <span class="preview-panel__dot"></span>
            プレビュー
        </div>
        <div class="preview-panel__content" id="preview-content">
            <p class="preview-empty">左のフォームを入力して「プレビューを生成」を押してください。</p>
        </div>
    </section>
</div>

<script>
    // 今日の日付をデフォルトに
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10);

    const CAT_LABELS = { review: '展示レビュー', essay: 'エッセイ', dialogue: '対談' };

    // ============================================================
    //  シンプルMarkdownパーサー
    // ============================================================
    function parseMarkdown(text) {
        if (!text) return '';
        const lines = text.split('\n');
        let html = '';
        let inBlockquote = false;

        lines.forEach(line => {
            // ブロック引用
            if (line.startsWith('> ')) {
                if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
                html += inlineFormat(line.slice(2)) + '<br>';
                return;
            } else if (inBlockquote) {
                html += '</blockquote>';
                inBlockquote = false;
            }

            if (line.startsWith('# '))  { html += `<h2>${inlineFormat(line.slice(2))}</h2>`; return; }
            if (line.startsWith('## ')) { html += `<h3>${inlineFormat(line.slice(3))}</h3>`; return; }
            if (line.trim() === '---')  { html += '<hr>'; return; }
            if (line.trim() === '')     { html += '</p><p>'; return; }
            html += inlineFormat(line) + '\n';
        });

        if (inBlockquote) html += '</blockquote>';

        // 段落タグで包む
        html = '<p>' + html + '</p>';
        // 空のpタグを除去
        html = html.replace(/<p>\s*<\/p>/g, '');
        html = html.replace(/<p>\s*(<h[23]>)/g, '$1');
        html = html.replace(/(<\/h[23]>)\s*<\/p>/g, '$1');
        html = html.replace(/<p>\s*(<hr>)\s*<\/p>/g, '$1');
        html = html.replace(/<p>\s*(<blockquote>)/g, '$1');
        html = html.replace(/(<\/blockquote>)\s*<\/p>/g, '$1');

        return html;
    }

    function inlineFormat(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    function formatDateJP(dateStr) {
        if (!dateStr) return '';
        const [y, m, d] = dateStr.split('-');
        return `${y}.${m}.${d}`;
    }

    let slugEdited = false;

    function shortHash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
            h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
        }
        return Math.abs(h).toString(36).slice(0, 5);
    }

    function titleToSlug(title) {
        const ascii = (title || '')
            .toLowerCase()
            .replace(/[^\x00-\x7F]/g, '')
            .replace(/[^a-z0-9\s-]/g, '')
            .trim()
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-')
            .slice(0, 24)
            .replace(/-$/, '');
        return ascii.length >= 3 ? ascii : shortHash(title || '');
    }

    function getSlug() {
        const field = document.getElementById('f-slug');
        const title = document.getElementById('f-title')?.value || '';
        return (field?.value.trim()) || titleToSlug(title);
    }

    function slugify() {
        const date = document.getElementById('f-date').value.replace(/-/g, '');
        return `${date}-${getSlug()}.html`;
    }

    function updateSlugHint() {
        const date = document.getElementById('f-date').value.replace(/-/g, '');
        const display = document.getElementById('slug-display');
        if (display) display.textContent = date ? `${date}-${getSlug()}` : '——';
    }

    // ============================================================
    //  プレビュー生成
    // ============================================================
    function generatePreview() {
        const cat      = document.getElementById('f-cat').value;
        const title    = document.getElementById('f-title').value || '（タイトル未入力）';
        const subtitle = document.getElementById('f-subtitle').value;
        const author   = document.getElementById('f-author').value || '編集部';
        const date     = document.getElementById('f-date').value;
        const body     = document.getElementById('f-body').value;

        const bodyHTML = parseMarkdown(body);
        const dateJP   = formatDateJP(date);

        const previewHTML = `
            <div class="preview-article__eyebrow">
                <span class="preview-article__tag tag-${cat}">${CAT_LABELS[cat]}</span>
                <span class="preview-article__date">${dateJP}</span>
            </div>
            <h1 class="preview-article__title">${title}</h1>
            ${subtitle ? `<p class="preview-article__subtitle">${subtitle}</p>` : ''}
            <p class="preview-article__author">By ${author}</p>
            <div class="preview-article__body">${bodyHTML}</div>
        `;

        document.getElementById('preview-content').innerHTML = previewHTML;

        document.getElementById('btn-download').classList.add('is-visible');
        updateSlugHint();
    }

    // ============================================================
    //  HTMLファイルを生成・ダウンロード
    // ============================================================
    function generateArticleHTML() {
        const cat      = document.getElementById('f-cat').value;
        const title    = document.getElementById('f-title').value || '無題';
        const subtitle = document.getElementById('f-subtitle').value;
        const author   = document.getElementById('f-author').value || '編集部';
        const date     = document.getElementById('f-date').value;
        const body     = document.getElementById('f-body').value;

        const bodyHTML = parseMarkdown(body);
        const dateJP   = formatDateJP(date);
        const catLabel = CAT_LABELS[cat];
        const filename = slugify();

        return `<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>

        .article-body h3 { font-family:var(--serif); font-weight:700; font-size:18px; margin:40px 0 16px; }
        .article-body p { margin-bottom:28px; }

        .article-body hr { border:none; border-top:1px solid var(--line); margin:52px 0; }
        .article-back { display:inline-block; margin-top:64px; font-size:12px; letter-spacing:.16em; font-weight:700; color:var(--accent); border-bottom:1px solid var(--accent); padding-bottom:3px; }
        .tag--review  { background:var(--accent2); color:#fff; border-color:var(--accent2); }
        .tag--essay   { background:var(--accent);  color:#fff; border-color:var(--accent); }
        .tag--dialogue{ background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
        /* シェアバー */
        .share-bar{max-width:760px;margin:48px auto 0;padding:32px 0 0;border-top:1px solid var(--line);display:flex;align-items:center;gap:14px}
        .share-bar__label{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--fg-mute);text-transform:uppercase;margin-right:4px}
        .share-btn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid var(--line);border-radius:50%;background:none;cursor:pointer;color:var(--fg-mute);text-decoration:none;transition:border-color .2s,color .2s}
        .share-btn:hover{border-color:var(--fg);color:var(--fg)}
        .share-btn--copy.is-copied{border-color:var(--accent);color:var(--accent)}
    </style>
</head>

    function downloadHTML() {
        const filename = slugify();

        const html = generateArticleHTML();
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const titleInput = document.getElementById('f-title');
        const dateInput  = document.getElementById('f-date');
        const slugInput  = document.getElementById('f-slug');

        titleInput?.addEventListener('input', () => {
            if (!slugEdited) {
                slugInput.value = titleToSlug(titleInput.value);
            }
            updateSlugHint();
        });

        dateInput?.addEventListener('change', updateSlugHint);

        slugInput?.addEventListener('input', () => {
            slugEdited = slugInput.value.trim() !== '';
            updateSlugHint();
        });
    });
</script>
