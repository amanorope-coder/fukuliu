<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56" role="img" aria-label="伏流 FUKULIU">
    <defs>
        <style>
            .fg { fill: #111114; }
            .ac { fill: #235BC8; }
            .mu { fill: #5f6168; }
            .kanji {
                font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN W9', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', system-ui, sans-serif;
                font-weight: 900;
                letter-spacing: -3px;
            }
            .meta {
                font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif;
                font-weight: 700;
                letter-spacing: 3px;
                fill: #5f6168;
            }
        </style>
    </defs>

    <!-- 伏流 -->
    <text x="0" y="38" class="kanji fg" font-size="42">伏流</text>

    <!-- 青い決め点 -->
    <rect x="79" y="29" width="6" height="6" class="ac"/>

    <!-- カクカクの折れ線（小） -->
    <path d="M 96 24 L 116 24 L 122 18 L 138 18 L 144 24 L 156 24"
          stroke="#235BC8" stroke-width="1.6" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>

    <!-- FUKULIU 小 -->
    <text x="96" y="42" class="meta" font-size="11">FUKULIU</text>
</svg>
